name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/kiden-release.keystore

      - name: Configure release signing
        run: |
          cat >> android/app/build.gradle << 'SIGNING'

          android.signingConfigs.release {
              storeFile file('kiden-release.keystore')
              storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
              keyAlias "${{ secrets.KEY_ALIAS }}"
              keyPassword "${{ secrets.KEY_PASSWORD }}"
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          SIGNING

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.release_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiden-apk
          path: |
            mobile/android/app/build/outputs/apk/release/*.apk
            mobile/android/app/build/outputs/apk/debug/*.apk

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          VERSION="${GITHUB_REF#refs/tags/}"
          cp "$APK_PATH" "../kiden-${VERSION}.apk"
          gh release create "$VERSION" "../kiden-${VERSION}.apk" \
            --title "키든 ${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ota:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export OTA bundle
        run: npx expo export --platform android --output-dir dist-ota

      - name: Create & upload OTA release
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          TIMESTAMP=$(date +%s)
          OTA_TAG="ota-${VERSION}-${TIMESTAMP}"
          BUNDLE_FILE=$(ls dist-ota/_expo/static/js/android/ | head -1)
          BUNDLE_PATH="dist-ota/_expo/static/js/android/$BUNDLE_FILE"
          REPO="${{ github.repository }}"
          BUNDLE_URL="https://github.com/${REPO}/releases/download/${OTA_TAG}/${BUNDLE_FILE}"
          BUNDLE_HASH=$(sha256sum "$BUNDLE_PATH" | cut -d' ' -f1)

          cat > dist-ota/manifest.json << EOF
          {
            "id": "kiden-${TIMESTAMP}",
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "runtimeVersion": "${VERSION}",
            "launchAsset": {
              "hash": "${BUNDLE_HASH}",
              "key": "bundle",
              "contentType": "application/javascript",
              "url": "${BUNDLE_URL}"
            },
            "assets": [],
            "metadata": { "version": "${VERSION}", "channel": "production" },
            "extra": {
              "expoClient": { "name": "키든", "slug": "kiden", "version": "${VERSION}" }
            }
          }
          EOF

          gh release create "$OTA_TAG" "$BUNDLE_PATH" dist-ota/manifest.json \
            --title "OTA Update ${VERSION}" \
            --notes "자동 OTA 업데이트 번들" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
